<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Draft Season</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="../CSS/DraftPage.css"/>
</head>
<body>

<header>
  <h1>Draft Season</h1>
  <span class="header-meta">2026 NFL DRAFT &nbsp;·&nbsp; </span>
  <span class="header-badge">LIVE</span>
</header>

<main>

  <!-- ══ LEFT: DRAFT BOARD ══ -->
<div class="panel" id="panel-draft">
  <div class="panel-header">
    <div class="panel-title"><span class="dot"></span> Draft Board</div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-top:6px;">
      <div class="panel-sub" id="draft-total">257 TOTAL PICKS</div>
      <div class="pick-chip">Pick <span class="chip-val" id="current-pick">1</span>&nbsp;/&nbsp;<span id="total-picks">257</span></div>
    </div>
  </div>
  <!-- Rendered by renderDraftBoard() in draft.js -->
  <div class="panel-body" id="draft-body"></div>
</div>

  <!-- ══ CENTER: CONTROLS ══ -->
  <div id="panel-center">

    <!-- Clock -->
    <div class="clock-ring">
      <svg viewBox="0 0 100 100">
        <circle class="track" cx="50" cy="50" r="45"/>
        <circle class="progress" cx="50" cy="50" r="45" id="clock-progress"/>
      </svg>
      <div class="clock-inner">
        <div class="clock-time" id="clock-display">7:00</div>
        <div class="clock-label">ON CLOCK</div>
      </div>
    </div>

    <!-- On the clock team -->
    <div class="on-clock-box">
      <div class="on-clock-label">NOW SELECTING</div>
      <div class="on-clock-team">Jacksonville Jaguars</div>
      <div class="on-clock-pick">Pick #5 · Round 1</div>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Simulation buttons -->
    <div class="ctrl-group">
      <div class="ctrl-label">SIMULATION</div>
      <button class="ctrl-btn primary" id="btn-pause">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
        Pause Draft
      </button>
      <button class="ctrl-btn" id="btn-restart">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4"/></svg>
        Restart
      </button>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Speed -->
    <div class="speed-group">
      <div class="ctrl-label">PICK SPEED</div>
      <div class="speed-row">
        <div class="speed-btn" onclick="setSpeed(this,'0.5x')">0.5×</div>
        <div class="speed-btn active" onclick="setSpeed(this,'1x')">1×</div>
        <div class="speed-btn" onclick="setSpeed(this,'2x')">2×</div>
        <div class="speed-btn" onclick="setSpeed(this,'5x')">5×</div>
      </div>
    </div>

    <div class="ctrl-divider"></div>

    <!-- Progress -->
    <div class="progress-group">
      <div class="ctrl-label">DRAFT PROGRESS</div>
      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progress-fill"></div>
      </div>
      <div class="progress-nums">
        <span id="prog-done">4 done</span>
        <span id="prog-left">253 left</span>
      </div>
    </div>

  </div>

  <!-- ══ RIGHT: PLAYER POOL ══ -->
  <div class="panel" id="panel-players">
    <div class="panel-header">
      <div class="panel-title"><span class="dot" style="background:var(--accent2)"></span> Player Pool</div>
      <div style="display:flex; justify-content:space-between; align-items:center; margin-top:6px;">
        <div class="panel-sub">315 PROSPECTS</div>
        <div class="pick-chip"><span class="chip-val" id="avail-count">315</span>&nbsp;available</div>
      </div>
    </div>

    <!-- Search -->
    <div class="search-wrap">
      <input class="search-input" type="text" placeholder="Search player or school…" id="player-search"/>
    </div>

    <!-- Filter tabs -->
    <div class="filter-tabs">
      <div class="filter-tab active" onclick="setFilter(this,'ALL')">ALL</div>
      <div class="filter-tab" onclick="setFilter(this,'QB')">QB</div>
      <div class="filter-tab" onclick="setFilter(this,'WR')">WR</div>
      <div class="filter-tab" onclick="setFilter(this,'RB')">RB</div>
      <div class="filter-tab" onclick="setFilter(this,'TE')">TE</div>
      <div class="filter-tab" onclick="setFilter(this,'OT')">OT</div>
      <div class="filter-tab" onclick="setFilter(this,'OG')">OG</div>
      <div class="filter-tab" onclick="setFilter(this,'OC')">OC</div>
      <div class="filter-tab" onclick="setFilter(this,'EDGE')">EDGE</div>
      <div class="filter-tab" onclick="setFilter(this,'DL')">DL</div>
      <div class="filter-tab" onclick="setFilter(this,'LB')">LB</div>
      <div class="filter-tab" onclick="setFilter(this,'CB')">CB</div>
      <div class="filter-tab" onclick="setFilter(this,'S')">S</div>
      <div class="filter-tab" onclick="setFilter(this,'K')">K</div>
      <div class="filter-tab" onclick="setFilter(this,'P')">P</div>
    </div>

    <!-- Player list (rendered by draft.js) -->
    <div class="panel-body" id="player-body"></div>
  </div>

</main>

<!-- ══ PLAYER CARD MODAL ══ -->
<!-- Backdrop: clicking it closes the modal (handled in draft.js). -->
<!-- The inner div is empty — buildPlayerCard(p) writes the HTML each time. -->
<div id="player-modal">
  <div class="modal-card" id="modal-card-inner"></div>
</div>

<!-- JS loaded at end of body so the DOM is ready when it runs -->
<script src="../JavaScript/DraftPage.js"></script>

</body>
</html>
